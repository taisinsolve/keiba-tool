<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出馬表メーカー</title>
<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f3f3f3;
    margin:0;
    padding:15px;
}
.container{
    max-width:700px;
    margin:auto;
}
.card{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
}
h1{
    margin-top:0;
}
textarea{
    width:100%;
    height:180px;
    box-sizing:border-box;
    font-size:16px;
}
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    font-size:16px;
    background:#2f7df6;
    color:white;
    border:none;
    border-radius:8px;
}
table{
    width:100%;
    border-collapse:collapse;
    background:white;
}
th{
    background:#e5e5e5;
    border:1px solid #ccc;
    padding:8px;
}
td{
    border:1px solid #ddd;
    padding:8px;
}
.waku{
    text-align:center;
    font-weight:bold;
}
.frame1{background:#ffffff;}
.frame2{background:#000000;color:white;}
.frame3{background:#ff4d4d;color:white;}
.frame4{background:#4d7dff;color:white;}
.frame5{background:#ffe44d;}
.frame6{background:#4caf50;color:white;}
.frame7{background:#ff9a3c;}
.frame8{background:#ff9fd6;}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>出馬表メーカー 試作品3号</h1>
<textarea id="input">1,オグリキャップ
2,イナリワン
3,スーパークリーク
4,サッカーボーイ
5,タマモクロス
6,メジロマックイーン
7,ライスシャワー
8,ナリタブライアン</textarea>

出馬表生成

</div>
<div class="card">
<table>
<thead>
<tr>
<th>枠</th>
<th>馬</th>
<th>馬名</th>
<th>性齢</th>
</tr>
</thead>
<tbody id="result">
</tbody>
</table>
</div>
</div>
<script>
function getFrame(number,total){

    if(total <= 8){
        return number;
    }

    if(total <= 16){
        return Math.ceil(number / 2);
    }

    if(total == 17){
        if(number <= 14){
            return Math.ceil(number / 2);
        }
        return number - 7;
    }

    if(total >= 18){
        if(number <= 14){
            return Math.ceil(number / 2);
        }
        return 8;
    }

    return Math.ceil(number / 2);
}
function generate(){
const text=document.getElementById("input").value.trim();
const lines=text.split("\n");
let horses=[];
for(const line of lines){
    const parts=line.split(",");
    if(parts.length < 2){
        continue;
    }
    horses.push({
        number:Number(parts[0]),
        name:parts[1].trim()
    });
}
horses.sort((a,b)=>a.number-b.number);
let html="";
for(const horse of horses){
    const frame=getFrame(horse.number,horses.length);
    html += `
    <tr>
        <td class="waku frame${frame}">
            ${frame}
        </td>
        <td>
            ${horse.number}
        </td>
        <td>
            ${horse.name}
        </td>
        <td>
        </td>
    </tr>
    `;
}
document.getElementById("result").innerHTML=html;
}
generate();
</script>
</body>
</html>
